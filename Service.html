<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank or Appraisal</title>
    <link rel="stylesheet" href="town.css">
</head>
<body>
    <!--Bank Features-->
    <div id="Booth"></div>
    <img src="images/bankers/LocustOffice.png" id="Office" style="position: absolute; z-index: 2; left: -1%; top: -1%; width: 101%; height: 100.5%;">
    <img src="images/bankers/Locust0.png" id="Clerk" style="position: absolute; left: 30%;">
    <img src="images/bankers/SharkMouth.png" id="Front" style="position: absolute; left: 30%; top: 10%; z-index: 3; display: none;">
    <img src="images/pawnshop/Map.png" id="Map" style="position: absolute; z-index: 5; cursor: pointer; left: -2%; top: 15%; width: 15%">

    <!--The Map-->
    <img src="images/mappy/WhereGo.png" id="WhereGo">
    <img src="images/mappy/CancelMap.png" id="CancelMap">
    <img src="images/mappy/PawnShopMap.png" id="HomeMap", class="Mappy">
    <img src="images/mappy/LocustMap.png" id="LocustMap", class="Mappy">
    <img src="images/mappy/TigerMap.png" id="TigerMap", class="Mappy">
    <img src="images/mappy/MushroomMap.png" id="MushroomMap", class="Mappy">
    <img src="images/mappy/AppraisalMap.png" id="AppraisalMap", class="Mappy">
    <img src="images/mappy/MinesMap.png" id="MinesMap", class="Mappy">
    <img src="images/mappy/BikeMap.png" id="BikeMap">

    <script src="gold.js"></script>
</body>
</html>
