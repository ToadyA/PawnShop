<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawn Shop</title>
    <link rel="stylesheet" href="town.css">
</head>
<body>
    <!-- https://freesound.org/people/corpocracy/sounds/403355/ -->
    <!-- https://freesound.org/people/volivieri/sounds/161190/ -->
    <img src="images/pawnshop/ShopBG.png" id="Background">
    <img src="images/pawnshop/ShopFG.png" id="Foreground">
    <!-- https://freesound.org/people/shakaharu/sounds/88502/ -->
    <img src="images/pawnshop/GlassDown.png" id="Barrier">

    <!--Clients-->
    <div id="Booth"></div>
    <img src="images/clients/Grass.png" id="Customer1">
    <img src="images/clients/Goose.png" id="Customer2">

    <!--Curio Slots-->
    <img src="images/curios/Slot.png" id="Slot1" class="Curio">
    <img src="images/curios/Slot.png" id="Slot2" class="Curio">
    <img src="images/curios/Slot.png" id="Slot3" class="Curio">
    <img src="images/curios/Slot.png" id="Slot4" class="Curio">
    <img src="images/curios/Slot.png" id="Slot5" class="Curio">
    <img src="images/curios/Slot.png" id="Slot6" class="Curio">

    <!--Interactables-->
    <img src="images/pawnshop/Sack.png" id="Sack">
    <img src="images/pawnshop/Basket.png" id="Basket">
    <img src="images/pawnshop/PunchBox.png" id="Shift">
    <img src="images/pawnshop/FlatBat.png" id="FlatBat">
    <!-- https://freesound.org/people/5ro4/sounds/611113/ -->
    <img src="images/pawnshop/Bell.png" id="Bell">
    <img src="images/pawnshop/Map.png" id="Map">

    <!--The Map-->
    <img src="images/mappy/WhereGo.png" id="WhereGo">
    <img src="images/mappy/CancelMap.png" id="CancelMap">
    <img src="images/mappy/PawnShopMap.png" id="HomeMap" class="Mappy">
    <img src="images/mappy/LocustMap.png" id="LocustMap" class="Mappy">
    <img src="images/mappy/TigerMap.png" id="TigerMap" class="Mappy">
    <img src="images/mappy/MushroomMap.png" id="MushroomMap" class="Mappy">
    <img src="images/mappy/AppraisalMap.png" id="AppraisalMap" class="Mappy">
    <img src="images/mappy/MinesMap.png" id="MinesMap" class="Mappy">
    <img src="images/mappy/BikeMap.png" id="BikeMap">

    <script src="barter.js"></script>
</body>
</html>
